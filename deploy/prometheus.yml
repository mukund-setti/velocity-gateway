global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: velo
    static_configs:
      - targets: ["velo:9100"]

  - job_name: mock-backends
    static_configs:
      - targets:
          - "mock-backend-1:9000"
          - "mock-backend-2:9000"
        labels:
          service: "mock-backend"
