run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gofmt
    - goimports
    - revive

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck]
    - path: bench/
      linters: [errcheck]
