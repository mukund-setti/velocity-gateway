name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: go mod download
        run: go mod download
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./internal/...
      - name: coverage summary
        run: go tool cover -func=coverage.txt | tail -n 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.1
          args: --timeout=5m

  build:
    name: Build images
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Build velo image
        run: docker build -f deploy/Dockerfile.velo -t velo:ci .
      - name: Build mock-backend image
        run: docker build -f deploy/Dockerfile.mock-backend -t velo-mock:ci .
